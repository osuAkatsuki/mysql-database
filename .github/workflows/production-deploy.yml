name: production-deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out latest commit
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/osuakatsuki/mysql-database:latest
            ghcr.io/osuakatsuki/mysql-database:${{ github.sha }}

      - name: Run migrations on production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/akatsuki
            docker pull ghcr.io/osuakatsuki/mysql-database:latest
            source .env
            docker run --rm \
              --add-host=host.docker.internal:host-gateway \
              -e PULL_SECRETS_FROM_VAULT=1 \
              -e APP_ENV=production \
              -e VAULT_ADDR=http://host.docker.internal:8200 \
              -e VAULT_TOKEN=$VAULT_TOKEN \
              ghcr.io/osuakatsuki/mysql-database:latest
